[driver_mapping]
0 = EIO0
1 = EIO1
2 = EIO2
3 = EIO3
4 = EIO4
5 = EIO5
;reserved for ignition
6 = CIO2

; mapping order is also column order in .csv output
[sensor_channel_mapping]
b_load_1 = AIN48
s_load_1 = AIN49
k_load_3 = AIN50
k_load_4 = AIN51
strain_1 = AIN52
strain_2 = AIN53
thermo_1 = AIN64
thermo_2 = AIN65
thermo_3 = AIN66
thermo_4 = AIN67
;combustion chamber
pres_1   = AIN68
;feedline
pres_2   = AIN69
;injector
pres_3   = AIN70
;ox tank
pres_4   = AIN71

[sensor_negative_channels]
